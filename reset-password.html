<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#24308f" />
  <title>Réinitialiser le mot de passe</title>

  <style>
    :root{
      --bg:#f7f8fc;
      --card:#ffffff;
      --text:#1d2433;
      --muted:#667085;
      --primary:#24308f;
      --primary-2:#3244c8;
      --border:#d9e0ef;
      --ok:#1f9d55;
      --danger:#c0392b;
      --radius:18px;
      --shadow:0 10px 30px rgba(29,36,51,.08);
      --font-sans: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#f8faff 0%, #eef2fb 100%);
      color:var(--text);
      font-family:var(--font-sans);
      padding:24px;
    }
    .card{
      width:min(100%, 480px);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }
    h1{
      margin:0 0 8px 0;
      font-size:1.4rem;
    }
    p{
      margin:0 0 16px 0;
      color:var(--muted);
      line-height:1.5;
    }
    label{
      display:block;
      font-weight:700;
      margin:14px 0 6px 0;
    }
    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:12px;
      font-size:1rem;
      outline:none;
    }
    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(36,48,143,.12);
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:18px;
    }
    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      background:var(--primary);
      color:white;
    }
    button:hover{ background:var(--primary-2); }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .secondary{
      background:#eef2fb;
      color:var(--text);
      border:1px solid var(--border);
    }
    .msg{
      margin-top:16px;
      padding:12px 14px;
      border-radius:12px;
      display:none;
      font-size:.95rem;
      line-height:1.4;
    }
    .msg.show{ display:block; }
    .msg.ok{
      background:#eefbf3;
      color:var(--ok);
      border:1px solid #cfead8;
    }
    .msg.err{
      background:#fff2f0;
      color:var(--danger);
      border:1px solid #f1c6bf;
    }
    .hint{
      font-size:.9rem;
      color:var(--muted);
      margin-top:10px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Réinitialiser le mot de passe</h1>
    <p id="intro">
      Saisis un nouveau mot de passe pour terminer la récupération de ton compte.
    </p>

    <form id="reset-form">
      <label for="new-password">Nouveau mot de passe</label>
      <input id="new-password" type="password" autocomplete="new-password" required />

      <label for="confirm-password">Confirmer le mot de passe</label>
      <input id="confirm-password" type="password" autocomplete="new-password" required />

      <div class="row">
        <button id="btn-save" type="submit">Enregistrer le nouveau mot de passe</button>
        <a href="./index.html"><button type="button" class="secondary">Retour</button></a>
      </div>
    </form>

    <div id="msg-ok" class="msg ok"></div>
    <div id="msg-err" class="msg err"></div>

    <div class="hint">
      Si tu es arrivé ici sans passer par le lien reçu par email, recommence la procédure “mot de passe oublié”.
    </div>
  </main>

  <script type="module">
    import { supabase } from "./supabaseClient.js";

    const $ = (id) => document.getElementById(id);
    const form = $("reset-form");
    const btnSave = $("btn-save");
    const okBox = $("msg-ok");
    const errBox = $("msg-err");

    function showOk(message) {
      okBox.textContent = message;
      okBox.classList.add("show");
      errBox.classList.remove("show");
      errBox.textContent = "";
    }

    function showErr(message) {
      errBox.textContent = message;
      errBox.classList.add("show");
      okBox.classList.remove("show");
      okBox.textContent = "";
    }

    function clearMsgs() {
      okBox.classList.remove("show");
      errBox.classList.remove("show");
      okBox.textContent = "";
      errBox.textContent = "";
    }

    let recoveryReady = false;

    // 1) Si Supabase a déjà restauré une session de récupération
    try {
      const { data } = await supabase.auth.getSession();
      if (data?.session) {
        recoveryReady = true;
      }
    } catch (e) {
      console.warn("Session check:", e);
    }

    // 2) Supabase peut aussi signaler la récupération via l'événement auth
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" || session) {
        recoveryReady = true;
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMsgs();

      const p1 = $("new-password").value.trim();
      const p2 = $("confirm-password").value.trim();

      if (!p1 || !p2) {
        showErr("Merci de remplir les deux champs.");
        return;
      }

      if (p1 !== p2) {
        showErr("Les deux mots de passe ne correspondent pas.");
        return;
      }

      if (p1.length < 8) {
        showErr("Choisis un mot de passe d’au moins 8 caractères.");
        return;
      }

      if (!recoveryReady) {
        showErr("Le lien de récupération n’est pas prêt ou a expiré. Recommence depuis l’email envoyé par Supabase.");
        return;
      }

      btnSave.disabled = true;

      try {
        const { error } = await supabase.auth.updateUser({ password: p1 });

        if (error) {
          showErr("Impossible de mettre à jour le mot de passe : " + error.message);
          btnSave.disabled = false;
          return;
        }

        showOk("Mot de passe mis à jour avec succès. Tu peux maintenant revenir à l’application et te connecter.");
        form.reset();
      } catch (e) {
        showErr("Erreur inattendue : " + (e?.message || e));
      } finally {
        btnSave.disabled = false;
      }
    });
  </script>
</body>
</html>
